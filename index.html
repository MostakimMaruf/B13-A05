<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- css -->
    <link rel="stylesheet" href="style.css">

    <!-- added daisy ui links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- icon links -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <section class="flex items-center justify-center h-screen">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
            <img src="assets/github-logo.png" class="mx-auto h-[100px] w-[100px]" alt="GitHub Logo">
            <h1 class="mx-auto text-[#1F2937] font-semibold text-[24px]">GitHub Issues Tracker</h1>
            <p class="mx-auto text-[#6B7280]">Sign in to manage your issues</p>


            <label class="label">Username</label>
            <input type="text" id="username" class="input" placeholder="Username" />

            <label class="label">Password</label>
            <input type="password" id="password" class="input" placeholder="Password" />

            <button onclick="login()" class="btn bg-[#4A00FF] text-white mt-4">Login</button>

            <div class="flex items-center my-6">
                <div class="flex-grow border-t border-gray-400"></div>
                <span class="mx-4 text-gray-500">OR</span>
                <div class="flex-grow border-t border-gray-400"></div>
            </div>

            <p class="mx-auto text-[#6B7280]">Demo Credentials:</p>
            <br>
            <p class="mx-auto text-[#6B7280]"><span class="font-semibold text-[#1F2937]">Username:</span> admin</p>
            <p class="mx-auto text-[#6B7280]"><span class="font-semibold text-[#1F2937]">Password:</span> admin123</p>

        </fieldset>
    </section>



    <!-- js file -->
    <script src="script.js"></script>
</body>

</html>
