<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main page</title>


    <!-- css -->
    <link rel="stylesheet" href="style.css">

    <!-- added daisy ui links -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon links -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="">

    <nav class="navbar bg-base-100 shadow-sm px-6 py-3 mb-6">
        <div class="flex justify-between w-full items-center">
            <div class="flex items-center gap-2">
                <img src="assets/github-logo.png" class="h-9 w-9" alt="">
                <span class="text-xl font-semibold text-[#1F2937]">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-4 items-center">
                <input type="text" id="searchInput" placeholder="Search" class="input input-bordered w-32 md:w-auto">
                <button id="newIssueBtn" class="btn bg-[#4A00FF] text-white"><i class="fa-solid fa-plus"></i> New
                    Issue</button>
            </div>
        </div>
    </nav>


    <section class="w-[80%] mx-auto shadow-sm bg-white px-5 py-[4px] rounded space-x-2">
        <button onclick="filterIssues('all')" id="all-filter-btn"
            class="bg-[#4A00FF] text-white px-4 py-1 rounded sm:px-8 sm:py-2">All</button>

        <button onclick="filterIssues('open')" id="open-filter-btn"
            class="text-[#323B49] bg-gray-100 px-3 py-1 rounded sm:px-8 sm:py-2">Open</button>

        <button onclick="filterIssues('closed')" id="closed-filter-btn"
            class="text-[#323B49] bg-gray-100 px-3 py-1 rounded sm:px-8 sm:py-2">Closed</button>
    </section>

    <section class=" flex justify-between items-center w-[80%] mx-auto bg-white px-5 py-5 rounded mt-5 shadow-sm">
        <div class=" flex items-center gap-2 ">
            <div>
                <img src="assets/Aperture.png" alt="">
            </div>
            <div>
                <h2 id="issue-count" class="font-semibold text-xl text-[#1F2937]">50 Issues</h2>
                <p class="text-[#6B7280]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex items-center gap-4 ">
            <p class="font-medium text-[#1F2937]"><i class="fa-solid fa-circle text-green-400"></i> Open</p>
            <p class="font-medium text-[#1F2937]"><i class="fa-solid fa-circle text-[#4A00FF]"></i> Closed</p>
        </div>
    </section>


    <section id="issues-container" class="w-[80%] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-6">
    </section>


    <script src="script.js"></script>
</body>

</html>
